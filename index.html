<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Nginx Manager</title>
  <link rel="stylesheet" href="css/app.css" />
  <script>
    // Capture the ready payload synchronously so the bundle (which is
    // injected at end of body) can pick it up if it fires before then.
    (function () {
      try {
        if (window.axion && typeof window.axion.on === 'function') {
          window.axion.on('ready', function (info) { window.__nmgrReady = info; });
        }
      } catch (e) { /* swallow */ }
    })();
  </script>
</head>
<body>
  <div class="app">
    <div class="app-head">
      <section id="daemon-host" class="ax-stack" style="gap: 12px;">
        <div id="boot-msg" class="ax-text-secondary" style="padding: 14px 20px 0;">Loading…</div>
      </section>
      <nav class="tabs" id="tabs-nav" role="tablist"></nav>
    </div>
    <main class="app-body ax-stack" id="tab-content" style="gap: 10px;"></main>
  </div>

  <!-- Classic script (NOT type="module") — the iframe sandbox has an
       opaque origin which blocks fetch() and ESM module loading; classic
       scripts bypass CORS so this is the only reliable way to load JS. -->
  <script src="app.js"></script>

  <script>
    // If app.js didn't run within 5s, surface a diagnostic so the screen
    // isn't blank.
    setTimeout(function () {
      if (window.__nmgrMounted) return;
      var msg = document.getElementById('boot-msg');
      if (!msg) return;
      msg.style.color = 'var(--color-error)';
      msg.innerHTML =
        '<strong>Plugin did not finish loading.</strong><br/>' +
        'app.js failed to download or execute. Check the iframe console for details, ' +
        'and re-trust the plugin if the row shows a tampered pill.';
    }, 5000);
  </script>
</body>
</html>
